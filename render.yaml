# Render deployment config
services:
  - type: web
    name: portfolioweb
    runtime: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      # Add more env vars below
      # - key: SMTP_USER
      #   value: your-smtp-user
    # Health check endpoint
    healthCheckPath: /
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: ""
    startCommand: node ./bin/www
    ports:
      - 3000