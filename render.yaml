services:
  - type: web
    name: portfolioweb
    env: node
    buildCommand: npm ci --production
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Add your custom env vars below
      # - key: PORT
      #   value: 3000
    healthCheckPath: /health
    plan: free