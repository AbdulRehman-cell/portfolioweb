# Render deployment definition for Express app
services:
  - type: web
    name: portfolioweb
    env: docker
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Add your secrets/environment variables here or in Render dashboard
    healthCheckPath: /
    plan: starter
    # Exposes port 3000 by default