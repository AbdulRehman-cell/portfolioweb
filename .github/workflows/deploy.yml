name: Deploy PortfolioWeb to Render

on:
  push:
    branches:
      - main
  pull_request:

env:
  NODE_ENV: production

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    services:
      app:
        image: node:18.20.2-alpine
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.2

      - name: Install dependencies
        run: npm ci --production

      - name: Lint (skip if not configured)
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script found, skipping."
          fi

      - name: Test (skip if not configured)
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "No test script found, skipping."
          fi

      - name: Build Docker image
        run: docker build -t portfolioweb:0.0.0 .

      - name: Push to Render (auto-deploy via git, so skip manual push)
        if: github.ref == 'refs/heads/main'
        run: echo "Render auto-deploys from main. No manual push needed."