name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.2'

      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if present)
        run: |
          if [ -f "test.js" ] || [ -d "test" ]; then
            npm test
          else
            echo "No tests specified."
          fi

      - name: Build Docker image
        run: docker build -t portfolioweb:ci-test .

      - name: Run container & healthcheck
        run: |
          docker run -d --name web -p 3000:3000 portfolioweb:ci-test
          sleep 10
          if curl --fail http://localhost:3000/; then
            echo "Healthcheck passed."
          else
            echo "Healthcheck failed."
            exit 1
          fi

      - name: Deploy to Render (manual trigger)
        if: github.ref == 'refs/heads/main'
        run: echo "Push to main triggers Render auto-deployment via render.yaml."