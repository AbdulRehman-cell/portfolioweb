name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: Install dependencies
        run: npm ci

      - name: Run lint (if available)
        run: |
          npm run lint || echo "No lint script"

      - name: Run tests (if available)
        run: |
          npm test || echo "No test script"

      - name: Build Docker image
        run: docker build -t portfolio-web:${{ github.sha }} .

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST https://api.render.com/v1/services/{YOUR_SERVICE_ID}/deploy \
            -H "Authorization: Bearer $RENDER_API_KEY"
        # Replace {YOUR_SERVICE_ID} with your service ID from Render dashboard