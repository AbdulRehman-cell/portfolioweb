name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'

      - name: Install dependencies
        run: npm ci --only=production

      - name: Run basic checks (lint/build/test)
        run: |
          # Insert test commands here if available
          echo "No tests specified"
          npm run build || echo "No build step"
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t portfolioweb:0.0.0 .

      - name: Deploy to Render via Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Please set RENDER_DEPLOY_HOOK secret in Github!"
            exit 1
          fi
          curl -X POST $RENDER_DEPLOY_HOOK