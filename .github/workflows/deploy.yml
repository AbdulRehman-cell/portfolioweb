name: Deploy to Render

on:
  push:
    branches:
      - main
      - master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: Install dependencies
        run: npm ci

      - name: Run lint and tests (skip if no tests)
        run: npm run lint || echo "No lint task"; npm test || echo "No test task"

      - name: Build Docker image
        run: docker build -t portfolioweb:v0.0.0 .

      - name: Push to Render (deploy)
        uses: render-examples/render-deploy-action@v1
        with:
          renderServiceId: ${{ secrets.RENDER_SERVICE_ID }}
          apiKey: ${{ secrets.RENDER_API_KEY }}