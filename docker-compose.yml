version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolioweb:0.0.0
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Additional envs via .env (use docker-compose --env-file .env)
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # If you need database or redis, add them here. By default, just app.

# For local development, run:
# docker-compose up --build