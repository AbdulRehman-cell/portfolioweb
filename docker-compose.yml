version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Optionally map local env file in Render Pro plan, otherwise use Render's dashboard for secrets
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
    restart: unless-stopped
    depends_on: []
    # Uncomment if you want to use a volume for development
    # volumes:
    #   - .:/app