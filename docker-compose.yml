version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolioweb:0.0.0
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 2
    depends_on: []
    # If you add redis/db, put them here