version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolioweb:0.0.0
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Add other env vars in .env or render dashboard
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on: []
    # Uncomment below if you need volumes (for secrets, logs etc)
    # volumes:
    #   - ./logs:/app/logs
    #   - ./public:/app/public